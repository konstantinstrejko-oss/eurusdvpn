<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EurUsdVPN Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --purple:#7c3aed;--purple2:#a78bfa;--green:#10b981;--red:#ef4444;
  --yellow:#f59e0b;--blue:#3b82f6;--cyan:#06b6d4;
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(124,58,237,.15),transparent),radial-gradient(ellipse 60% 50% at 80% 110%,rgba(6,182,212,.1),transparent);pointer-events:none;z-index:0}

/* LOGIN */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg)}
.login-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px;width:100%;max-width:380px;backdrop-filter:blur(20px)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .pair{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:var(--purple2)}
.login-logo .sub{font-size:13px;color:var(--text3);margin-top:4px}
.login-card label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.login-card input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;margin-bottom:14px;font-family:inherit}
.login-card input:focus{border-color:var(--purple)}
.btn-login{width:100%;padding:12px;background:var(--purple);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px}
.btn-login:hover{background:#6d28d9}
.login-err{color:var(--red);font-size:13px;margin-top:10px;text-align:center;min-height:20px}

/* LAYOUT */
#app{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1}
header{background:rgba(0,0,0,.6);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);padding:0 20px;height:54px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50}
.h-logo{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--purple2);font-size:14px;white-space:nowrap}
.h-url{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.h-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit}
.h-btn:hover{background:rgba(255,255,255,.06)}
nav{display:flex;gap:2px;padding:10px 16px;overflow-x:auto;border-bottom:1px solid var(--border);background:rgba(0,0,0,.3)}
nav::-webkit-scrollbar{display:none}
.tab{padding:7px 14px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap}
.tab.active{background:rgba(124,58,237,.2);color:var(--purple2)}
.tab:hover:not(.active){background:rgba(255,255,255,.05);color:var(--text2)}
main{padding:16px;max-width:1200px;margin:0 auto;width:100%}
.screen{display:none}
.screen.active{display:block}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--text)}
.stat-val.green{color:var(--green)}
.stat-val.yellow{color:var(--yellow)}
.stat-val.purple{color:var(--purple2)}
.stat-val.blue{color:var(--blue)}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px}

/* TABLES */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:var(--text3);font-weight:500;font-size:11px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge.confirmed,.badge.active{background:rgba(16,185,129,.15);color:var(--green)}
.badge.pending{background:rgba(245,158,11,.15);color:var(--yellow)}
.badge.trial{background:rgba(59,130,246,.15);color:var(--blue)}
.badge.expired,.badge.cancelled,.badge.rejected{background:rgba(239,68,68,.1);color:var(--red)}
.badge.banned{background:rgba(239,68,68,.2);color:var(--red)}
.badge.extended{background:rgba(124,58,237,.15);color:var(--purple2)}
.badge.unknown{background:rgba(255,255,255,.08);color:var(--text3)}
.badge.known{background:rgba(16,185,129,.12);color:var(--green)}
.badge.personal{background:rgba(6,182,212,.15);color:var(--cyan)}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.link{color:var(--purple2);cursor:pointer;text-decoration:none}
.link:hover{text-decoration:underline}

/* CONTROLS */
.ctrl-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
input[type=text],input[type=search],select,textarea{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
input[type=text]:focus,input[type=search]:focus,select:focus,textarea:focus{border-color:var(--purple)}
select option{background:#1a1a2e}
textarea{width:100%;resize:vertical;min-height:120px}
.btn{padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.btn-primary{background:var(--purple);color:#fff}
.btn-primary:hover{background:#6d28d9}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-green{background:rgba(16,185,129,.2);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.btn-red{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-yellow{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid rgba(245,158,11,.3)}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.pages{display:flex;gap:6px;align-items:center;margin-top:12px;font-size:13px;color:var(--text2)}

/* MODAL */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:16px}
#modal-bg.open{display:flex}
#modal{background:#0f0f1a;border:1px solid var(--border);border-radius:16px;width:100%;max-width:620px;max-height:88vh;overflow-y:auto;padding:24px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-header h3{font-size:16px}
.close-btn{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:4px}

/* PEERS */
.peer-row td:nth-child(4){font-size:11px;font-family:'JetBrains Mono',monospace}
.handshake-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.dot-online{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot-offline{background:var(--text3)}

/* MISC */
.empty{text-align:center;color:var(--text3);padding:40px;font-size:14px}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-ok{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:var(--green)}
.alert-err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--purple2);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.stats-grid{grid-template-columns:1fr 1fr}main{padding:10px}header{padding:0 12px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">
      <div class="pair">EUR/USD<span style="color:var(--cyan)">VPN</span></div>
      <div class="sub">Admin Panel</div>
    </div>
    <label>API URL сервера</label>
    <input id="l-url" type="text" placeholder="https://294736.fornex.cloud" value="https://294736.fornex.cloud">
    <label>Admin API Key</label>
    <input id="l-key" type="password" placeholder="EurUsdAdmin_..." onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">🔐 Войти</button>
    <div class="login-err" id="l-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="h-logo">EUR/USD<span style="color:var(--cyan)">VPN</span> Admin</div>
    <div class="h-url" id="h-url-display"></div>
    <button class="h-btn" onclick="restartBot()" title="Перезапустить бота">↺ Restart</button>
    <button class="h-btn" onclick="doLogout()">Выйти</button>
  </header>
  <nav>
    <button class="tab active" onclick="showTab('stats')">📊 Дашборд</button>
    <button class="tab" onclick="showTab('users')">👥 Пользователи</button>
    <button class="tab" onclick="showTab('payments')">💳 Платежи</button>
    <button class="tab" onclick="showTab('peers')">🖥 Пиры VPN</button>
    <button class="tab" onclick="showTab('broadcast')">📢 Рассылка</button>
  </nav>
  <main>

    <!-- DASHBOARD -->
    <section class="screen active" id="scr-stats">
      <div class="stats-grid" id="stats-grid">
        <div class="stat"><div class="stat-val" id="st-users">—</div><div class="stat-label">Всего пользователей</div></div>
        <div class="stat"><div class="stat-val green" id="st-active">—</div><div class="stat-label">Активных подписок</div></div>
        <div class="stat"><div class="stat-val blue" id="st-trial">—</div><div class="stat-label">Триал</div></div>
        <div class="stat"><div class="stat-val yellow" id="st-pending">—</div><div class="stat-label">Ожидают оплаты</div></div>
        <div class="stat"><div class="stat-val purple" id="st-rev">—</div><div class="stat-label">Общая выручка</div></div>
        <div class="stat"><div class="stat-val green" id="st-today">—</div><div class="stat-label">Сегодня выручка</div></div>
        <div class="stat"><div class="stat-val" id="st-newusers">—</div><div class="stat-label">Новых сегодня</div></div>
      </div>
      <div class="card">
        <div class="card-title">🕐 Последние платежи</div>
        <div class="tbl-wrap" id="recent-pays"><div class="empty"><span class="spinner"></span></div></div>
      </div>
    </section>

    <!-- USERS -->
    <section class="screen" id="scr-users">
      <div class="ctrl-row">
        <input type="search" id="user-q" placeholder="tg_id, @username или имя…" style="flex:1;min-width:200px" onkeydown="if(event.key==='Enter')searchUsers()">
        <button class="btn btn-primary" onclick="searchUsers()">🔍 Найти</button>
        <button class="btn btn-ghost" onclick="loadUsers(0,'')">Все</button>
      </div>
      <div class="card" style="padding:0">
        <div class="tbl-wrap" id="users-tbl"><div class="empty"><span class="spinner"></span></div></div>
        <div class="pages" id="users-pages" style="padding:12px 18px"></div>
      </div>
    </section>

    <!-- PAYMENTS -->
    <section class="screen" id="scr-payments">
      <div class="ctrl-row">
        <select id="pay-filter" onchange="loadPayments(0)">
          <option value="all">Все статусы</option>
          <option value="pending">Ожидают</option>
          <option value="confirmed">Активные</option>
          <option value="extended">Продлённые</option>
          <option value="cancelled">Отменённые</option>
          <option value="expired">Истёкшие</option>
          <option value="banned">Заблокированные</option>
        </select>
        <button class="btn btn-ghost" onclick="loadPayments(0)">↺ Обновить</button>
      </div>
      <div class="card" style="padding:0">
        <div class="tbl-wrap" id="pays-tbl"><div class="empty"><span class="spinner"></span></div></div>
        <div class="pages" id="pays-pages" style="padding:12px 18px"></div>
      </div>
    </section>

    <!-- PEERS -->
    <section class="screen" id="scr-peers">
      <div class="ctrl-row">
        <button class="btn btn-primary" onclick="loadPeers()">↺ Обновить</button>
        <span id="peers-count" style="font-size:13px;color:var(--text2)"></span>
      </div>
      <div class="card" style="padding:0">
        <div class="tbl-wrap" id="peers-tbl"><div class="empty"><span class="spinner"></span></div></div>
      </div>
    </section>

    <!-- BROADCAST -->
    <section class="screen" id="scr-broadcast">
      <div class="card">
        <div class="card-title">📢 Рассылка всем пользователям</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:10px">Поддерживает HTML-теги: &lt;b&gt;, &lt;i&gt;, &lt;code&gt;, &lt;a href="..."&gt;</div>
        <textarea id="bc-text" placeholder="Текст сообщения..."></textarea>
        <div style="margin-top:10px;display:flex;gap:8px;align-items:center">
          <button class="btn btn-primary" onclick="sendBroadcast()">📢 Отправить всем</button>
          <button class="btn btn-ghost" onclick="previewBroadcast()">👁 Предпросмотр</button>
        </div>
        <div id="bc-preview" style="margin-top:14px;display:none">
          <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Предпросмотр:</div>
          <div id="bc-preview-text" style="background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:14px;line-height:1.6"></div>
        </div>
        <div id="bc-result" style="margin-top:12px"></div>
      </div>
    </section>

  </main>
</div>

<!-- USER MODAL -->
<div id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div class="modal-header">
      <h3 id="modal-title">Пользователь</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── STATE ──
let BASE = '', KEY = '';
let usersPage = 0, usersQuery = '';
let paysPage = 0;

// ── AUTH ──
function doLogin() {
  const url = document.getElementById('l-url').value.trim().replace(/\/$/, '');
  const key = document.getElementById('l-key').value.trim();
  if (!url || !key) { document.getElementById('l-err').textContent = 'Заполни оба поля'; return; }
  BASE = url; KEY = key;
  document.getElementById('l-err').textContent = '';
  // Test connection
  apiGet('/admin/stats').then(d => {
    if (d.error) { document.getElementById('l-err').textContent = 'Неверный ключ или URL'; return; }
    localStorage.setItem('adm_base', BASE);
    localStorage.setItem('adm_key', KEY);
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('h-url-display').textContent = BASE;
    renderStats(d);
    loadUsers(0, '');
    loadPayments(0);
    loadPeers();
  }).catch(() => { document.getElementById('l-err').textContent = 'Не удалось подключиться'; });
}

function doLogout() {
  localStorage.removeItem('adm_base'); localStorage.removeItem('adm_key');
  location.reload();
}

// ── API ──
async function apiGet(path) {
  const r = await fetch(BASE + path, { headers: { 'Authorization': 'Bearer ' + KEY } });
  return r.json();
}
async function apiPost(path, data) {
  const r = await fetch(BASE + path, {
    method: 'POST', headers: { 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  return r.json();
}

// ── TABS ──
function showTab(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('scr-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ── STATS ──
async function loadStats() {
  const d = await apiGet('/admin/stats');
  renderStats(d);
}
function renderStats(d) {
  document.getElementById('st-users').textContent = d.total_users ?? '—';
  document.getElementById('st-active').textContent = d.active_subs ?? '—';
  document.getElementById('st-trial').textContent = d.trial_subs ?? '—';
  document.getElementById('st-pending').textContent = d.pending_count ?? '—';
  document.getElementById('st-rev').textContent = d.total_revenue != null ? d.total_revenue + '₽' : '—';
  document.getElementById('st-today').textContent = d.today_revenue != null ? d.today_revenue + '₽' : '—';
  document.getElementById('st-newusers').textContent = d.new_users_today ?? '—';
  if (d.recent_payments) {
    document.getElementById('recent-pays').innerHTML = renderPayTable(d.recent_payments, false);
  }
}

// ── USERS ──
async function loadUsers(page, query) {
  usersPage = page ?? usersPage;
  usersQuery = (query !== undefined) ? query : usersQuery;
  document.getElementById('users-tbl').innerHTML = '<div class="empty"><span class="spinner"></span></div>';
  const d = await apiGet(`/admin/users?page=${usersPage}&q=${encodeURIComponent(usersQuery)}`);
  if (d.error) { document.getElementById('users-tbl').innerHTML = `<div class="empty">${d.error}</div>`; return; }
  const rows = (d.users || []).map(u => {
    const badge = statusBadge(u.sub_status || 'none');
    const planStr = planLabel(u.plan);
    const end = u.end_date ? u.end_date.slice(0,10) : '—';
    return `<tr>
      <td><span class="mono">${u.tg_id}</span></td>
      <td>${u.username ? '@'+esc(u.username) : '<span class="mono" style="color:var(--text3)">—</span>'}</td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis">${esc(u.name||'')}</td>
      <td>${planStr}</td>
      <td>${badge}</td>
      <td class="mono" style="font-size:11px">${end}</td>
      <td><button class="btn btn-sm btn-ghost" onclick="openUser(${u.tg_id})">Подробно</button></td>
    </tr>`;
  }).join('');
  document.getElementById('users-tbl').innerHTML = rows
    ? `<table><thead><tr><th>TG ID</th><th>Username</th><th>Имя</th><th>Тариф</th><th>Статус</th><th>До</th><th></th></tr></thead><tbody>${rows}</tbody></table>`
    : '<div class="empty">Ничего не найдено</div>';
  renderPages('users-pages', usersPage, d.total, d.per_page, p => loadUsers(p));
}

function searchUsers() {
  usersQuery = document.getElementById('user-q').value.trim();
  loadUsers(0);
}

// ── USER DETAIL MODAL ──
async function openUser(tg_id) {
  document.getElementById('modal-title').textContent = 'Пользователь ' + tg_id;
  document.getElementById('modal-body').innerHTML = '<div class="empty"><span class="spinner"></span></div>';
  document.getElementById('modal-bg').classList.add('open');
  const d = await apiGet('/admin/user_detail?tg_id=' + tg_id);
  if (d.error) { document.getElementById('modal-body').innerHTML = `<div class="alert alert-err">${d.error}</div>`; return; }
  const u = d.user || {};
  const isBanned = (d.payments || []).some(p => p.status === 'banned');
  const activeSub = (d.payments || []).find(p => p.status === 'confirmed' && p.plan !== 'dev_addon');
  document.getElementById('modal-title').textContent = (u.username ? '@' + u.username + ' ' : '') + tg_id;
  const payRows = (d.payments || []).slice(0, 10).map(p =>
    `<tr><td class="mono">#${p.id}</td><td>${planLabel(p.plan)}</td><td class="mono">${p.amount}₽</td><td>${statusBadge(p.status)}</td><td class="mono" style="font-size:11px">${(p.confirmed_at||'').slice(0,10)||'—'}</td><td class="mono" style="font-size:11px">${(p.end_date||'').slice(0,10)||'—'}</td></tr>`
  ).join('');
  const devRows = (d.devices || []).filter(dv => dv.status === 'active').map(dv =>
    `<tr><td>${esc(dv.name||'—')}</td><td class="mono">${dv.client_ip||'—'}</td><td>${statusBadge(dv.status)}</td></tr>`
  ).join('');
  document.getElementById('modal-body').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;font-size:13px">
      <div><span style="color:var(--text3)">TG ID</span><br><span class="mono">${tg_id}</span></div>
      <div><span style="color:var(--text3)">Username</span><br>${u.username ? '@'+esc(u.username) : '—'}</div>
      <div><span style="color:var(--text3)">Имя</span><br>${esc(u.name||'—')}</div>
      <div><span style="color:var(--text3)">Регистрация</span><br><span class="mono" style="font-size:11px">${(u.created_at||'').slice(0,16)}</span></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      ${isBanned
        ? `<button class="btn btn-sm btn-green" onclick="userAction(${tg_id},'unban',this)">✅ Разблокировать</button>`
        : `<button class="btn btn-sm btn-red" onclick="userAction(${tg_id},'ban',this)">🚫 Заблокировать</button>`}
      <a href="https://t.me/${u.username||''}" target="_blank" class="btn btn-sm btn-ghost">Открыть в TG</a>
    </div>
    ${payRows ? `<div class="card-title" style="margin-bottom:8px">💳 Платежи</div>
    <div class="tbl-wrap" style="margin-bottom:14px"><table><thead><tr><th>ID</th><th>Тариф</th><th>Сумма</th><th>Статус</th><th>Оплачен</th><th>До</th></tr></thead><tbody>${payRows}</tbody></table></div>` : ''}
    ${devRows ? `<div class="card-title" style="margin-bottom:8px">📱 Устройства</div>
    <div class="tbl-wrap"><table><thead><tr><th>Название</th><th>IP</th><th>Статус</th></tr></thead><tbody>${devRows}</tbody></table></div>` : ''}
  `;
}

async function userAction(tg_id, action, btn) {
  if (!confirm(action === 'ban' ? `Заблокировать ${tg_id}?` : `Разблокировать ${tg_id}?`)) return;
  btn.disabled = true; btn.textContent = '⏳';
  const d = await apiPost('/admin/user_action', { action, tg_id });
  if (d.status === 'ok') { closeModal(); loadUsers(); }
  else { alert('Ошибка: ' + (d.error || '?')); btn.disabled = false; }
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

// ── PAYMENTS ──
async function loadPayments(page) {
  if (page !== undefined) paysPage = page;
  const sf = document.getElementById('pay-filter').value;
  document.getElementById('pays-tbl').innerHTML = '<div class="empty"><span class="spinner"></span></div>';
  const d = await apiGet(`/admin/payments?page=${paysPage}&status=${sf}`);
  if (d.error) { document.getElementById('pays-tbl').innerHTML = `<div class="empty">${d.error}</div>`; return; }
  document.getElementById('pays-tbl').innerHTML = renderPayTable(d.payments || [], true);
  renderPages('pays-pages', paysPage, d.total, d.per_page, p => loadPayments(p));
}

function renderPayTable(pays, showActions) {
  if (!pays.length) return '<div class="empty">Нет платежей</div>';
  const rows = pays.map(p => {
    const txBadge = p.platega_tx_id ? '<span style="font-size:10px;color:var(--cyan)">СБП</span>' : '<span style="font-size:10px;color:var(--text3)">ручн</span>';
    const actions = showActions && p.status === 'pending' && !p.platega_tx_id
      ? `<button class="btn btn-sm btn-green" onclick="payAction(${p.id},'confirm',this)">✅</button>
         <button class="btn btn-sm btn-red" onclick="payAction(${p.id},'reject',this)">❌</button>`
      : '';
    const userLink = p.tg_id ? `<span class="link" onclick="openUser(${p.tg_id})">${p.username ? '@'+esc(p.username) : p.tg_id}</span>` : '—';
    return `<tr>
      <td class="mono">#${p.id}</td>
      <td>${userLink}</td>
      <td>${planLabel(p.plan)} ${txBadge}</td>
      <td class="mono">${p.amount}₽</td>
      <td>${statusBadge(p.status)}</td>
      <td class="mono" style="font-size:11px">${(p.confirmed_at||p.end_date||'').slice(0,10)||'—'}</td>
      ${showActions ? `<td style="white-space:nowrap">${actions}</td>` : ''}
    </tr>`;
  }).join('');
  const actCol = showActions ? '<th>Действия</th>' : '';
  return `<table><thead><tr><th>ID</th><th>Юзер</th><th>Тариф</th><th>Сумма</th><th>Статус</th><th>Дата</th>${actCol}</tr></thead><tbody>${rows}</tbody></table>`;
}

async function payAction(pid, action, btn) {
  btn.disabled = true;
  const d = await apiPost('/admin/payment_action', { action, pid });
  if (d.status === 'ok') { loadPayments(); loadStats(); }
  else { alert('Ошибка: ' + (d.error || '?')); btn.disabled = false; }
}

// ── PEERS ──
async function loadPeers() {
  document.getElementById('peers-tbl').innerHTML = '<div class="empty"><span class="spinner"></span></div>';
  document.getElementById('peers-count').textContent = '';
  const d = await apiGet('/admin/peers');
  if (d.error) { document.getElementById('peers-tbl').innerHTML = `<div class="empty">${d.error}</div>`; return; }
  const peers = d.peers || [];
  document.getElementById('peers-count').textContent = `${peers.length} пиров`;
  if (!peers.length) { document.getElementById('peers-tbl').innerHTML = '<div class="empty">Нет пиров</div>'; return; }
  const rows = peers.map(p => {
    const hsRaw = p.handshake || '';
    const online = hsRaw && !hsRaw.includes('Never') && isRecentHandshake(hsRaw);
    const dot = `<span class="handshake-dot ${online ? 'dot-online' : 'dot-offline'}"></span>`;
    const userCell = p.tg_id
      ? `<span class="link" onclick="openUser(${p.tg_id})">${p.username ? '@'+esc(p.username) : p.tg_id}</span>`
      : '<span style="color:var(--text3)">—</span>';
    return `<tr>
      <td>${dot}<span class="mono">${p.ip || '—'}</span></td>
      <td>${esc(p.dev_name||'—')}</td>
      <td>${userCell}</td>
      <td class="mono">${p.plan ? planLabel(p.plan) : '—'}</td>
      <td>${statusBadge(p.sub_status||p.label)}</td>
      <td class="mono" style="font-size:11px">${p.handshake ? p.handshake.slice(0,20) : '—'}</td>
      <td class="mono" style="font-size:11px">${p.transfer || '—'}</td>
    </tr>`;
  }).join('');
  document.getElementById('peers-tbl').innerHTML = `<table><thead><tr><th>IP</th><th>Устройство</th><th>Пользователь</th><th>Тариф</th><th>Статус</th><th>Последний хэндшейк</th><th>Трафик</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function isRecentHandshake(hs) {
  if (!hs || hs === 'Never') return false;
  if (hs.includes('second') || hs.includes('minute')) return true;
  if (hs.includes('hour')) {
    const m = hs.match(/(\d+)\s+hour/);
    return m && parseInt(m[1]) < 24;
  }
  return false;
}

// ── BROADCAST ──
function previewBroadcast() {
  const text = document.getElementById('bc-text').value;
  const prev = document.getElementById('bc-preview');
  document.getElementById('bc-preview-text').innerHTML = text;
  prev.style.display = text ? 'block' : 'none';
}

async function sendBroadcast() {
  const text = document.getElementById('bc-text').value.trim();
  if (!text) { alert('Введи текст'); return; }
  if (!confirm('Отправить сообщение ВСЕМ пользователям?')) return;
  const btn = event.currentTarget;
  btn.disabled = true; btn.textContent = '⏳ Отправляю…';
  const d = await apiPost('/admin/broadcast', { text });
  btn.disabled = false; btn.textContent = '📢 Отправить всем';
  const res = document.getElementById('bc-result');
  if (d.status === 'ok') {
    res.innerHTML = `<div class="alert alert-ok">✅ Отправлено: ${d.sent}, не доставлено: ${d.failed}</div>`;
  } else {
    res.innerHTML = `<div class="alert alert-err">❌ Ошибка: ${d.error||'?'}</div>`;
  }
}

// ── RESTART ──
async function restartBot() {
  if (!confirm('Перезапустить бота? (~5 сек. недоступен)')) return;
  await apiPost('/admin/restart', {});
  alert('Бот перезапускается…');
}

// ── PAGINATION ──
function renderPages(id, current, total, perPage, cb) {
  const totalPages = Math.max(1, Math.ceil(total / perPage));
  const el = document.getElementById(id);
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  let html = `<span style="color:var(--text3)">Стр. ${current+1} из ${totalPages} (${total})</span>`;
  if (current > 0) html += ` <button class="btn btn-sm btn-ghost" onclick="(${cb})(${current-1})">← Назад</button>`;
  if (current < totalPages - 1) html += ` <button class="btn btn-sm btn-ghost" onclick="(${cb})(${current+1})">Вперёд →</button>`;
  el.innerHTML = html;
}

// ── HELPERS ──
function statusBadge(s) {
  const map = { confirmed:'Активна', active:'Активно', extended:'Продлёна', pending:'Ожидает',
    trial:'Триал', expired:'Истекла', cancelled:'Отменена', rejected:'Отклонён',
    banned:'Заблок.', known:'Клиент', unknown:'Неизвестен', personal:'Личный', none:'Нет' };
  return `<span class="badge ${s||'none'}">${map[s]||s||'—'}</span>`;
}

function planLabel(p) {
  const m = { '7d':'7 дней','1m':'1 мес.','3m':'3 мес.','6m':'6 мес.','1y':'1 год','trial':'Триал','dev_addon':'Слот' };
  return m[p] || p || '—';
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── INIT ──
(function init() {
  const b = localStorage.getItem('adm_base');
  const k = localStorage.getItem('adm_key');
  if (b && k) {
    document.getElementById('l-url').value = b;
    document.getElementById('l-key').value = k;
    // Auto-login
    BASE = b; KEY = k;
    apiGet('/admin/stats').then(d => {
      if (d.error) return;
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('h-url-display').textContent = BASE;
      renderStats(d);
      loadUsers(0, '');
      loadPayments(0);
      loadPeers();
    }).catch(() => {});
  }
})();
</script>
